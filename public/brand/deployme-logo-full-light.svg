<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <!-- Minimal stack icon -->
  <g transform="translate(8, 6)">
    <!-- Bar 1 (bottom) — faint dots -->
    <rect x="0" y="52" width="52" height="7" rx="3.5" fill="#BFDBFE" opacity="0.5"/>
    <circle cx="13" cy="55.5" r="1.3" fill="#3B82F6" opacity="0.3"/>
    <circle cx="21" cy="55.5" r="1.3" fill="#3B82F6" opacity="0.3"/>
    <circle cx="29" cy="55.5" r="1.3" fill="#3B82F6" opacity="0.3"/>
    <circle cx="37" cy="55.5" r="1.3" fill="#3B82F6" opacity="0.3"/>

    <!-- Bar 2 (middle) — medium dots -->
    <rect x="0" y="41" width="52" height="7" rx="3.5" fill="#93C5FD" opacity="0.5"/>
    <circle cx="13" cy="44.5" r="1.3" fill="#3B82F6" opacity="0.45"/>
    <circle cx="21" cy="44.5" r="1.3" fill="#3B82F6" opacity="0.45"/>
    <circle cx="29" cy="44.5" r="1.3" fill="#3B82F6" opacity="0.45"/>
    <circle cx="37" cy="44.5" r="1.3" fill="#3B82F6" opacity="0.45"/>

    <!-- Bar 3 (top) — solid -->
    <rect x="0" y="6" width="52" height="30" rx="8" fill="#3B82F6"/>

    <!-- K8s helm -->
    <circle cx="26" cy="21" r="7" fill="none" stroke="#ffffff" stroke-width="1.6"/>
    <circle cx="26" cy="21" r="2" fill="#ffffff"/>
  </g>

  <!-- Text: deployme -->
  <text x="85" y="45" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#111827" letter-spacing="-0.5">
    deploy<tspan fill="#3B82F6">me</tspan>
  </text>
  <!-- Text: .cloud -->
  <text x="295" y="45" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#6B7280" letter-spacing="-0.5">
    .cloud
  </text>
  <!-- Tagline -->
  <text x="85" y="66" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF" letter-spacing="2">
    KUBERNETES AS A SERVICE
  </text>
</svg>
