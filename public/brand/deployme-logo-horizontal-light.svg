<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 50" fill="none">
  <!-- Minimal stack icon (compact) -->
  <g transform="translate(4, 4)">
    <!-- Bar 1 (bottom) — faint dots -->
    <rect x="0" y="35" width="38" height="5" rx="2.5" fill="#BFDBFE" opacity="0.5"/>
    <circle cx="10" cy="37.5" r="1" fill="#3B82F6" opacity="0.3"/>
    <circle cx="16" cy="37.5" r="1" fill="#3B82F6" opacity="0.3"/>
    <circle cx="22" cy="37.5" r="1" fill="#3B82F6" opacity="0.3"/>
    <circle cx="28" cy="37.5" r="1" fill="#3B82F6" opacity="0.3"/>

    <!-- Bar 2 (middle) — medium dots -->
    <rect x="0" y="27" width="38" height="5" rx="2.5" fill="#93C5FD" opacity="0.5"/>
    <circle cx="10" cy="29.5" r="1" fill="#3B82F6" opacity="0.45"/>
    <circle cx="16" cy="29.5" r="1" fill="#3B82F6" opacity="0.45"/>
    <circle cx="22" cy="29.5" r="1" fill="#3B82F6" opacity="0.45"/>
    <circle cx="28" cy="29.5" r="1" fill="#3B82F6" opacity="0.45"/>

    <!-- Bar 3 (top) — solid -->
    <rect x="0" y="4" width="38" height="20" rx="6" fill="#3B82F6"/>

    <!-- K8s helm -->
    <circle cx="19" cy="14" r="5" fill="none" stroke="#ffffff" stroke-width="1.3"/>
    <circle cx="19" cy="14" r="1.4" fill="#ffffff"/>
  </g>

  <!-- Text -->
  <text x="54" y="32" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#111827" letter-spacing="-0.3">
    deploy<tspan fill="#3B82F6">me</tspan><tspan fill="#6B7280" font-weight="400">.cloud</tspan>
  </text>
</svg>
